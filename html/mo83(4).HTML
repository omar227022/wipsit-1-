<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>♯ 𝔠𝔞𝔩𝔩 𝟗𝟏𝟏 حسابات</title>
    
    <link rel="preload" as="image" href="g1.jpg" fetchpriority="high">
    <link rel="preload" as="image" href="m1.jpg" fetchpriority="high">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+Arabic:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.6)), url('g1.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Cinzel', 'Noto Sans Arabic', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 15px; 
            z-index: 10;
            width: 100%;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid #d4af37;
            padding: 45px 20px;
            text-align: center;
            width: 95%; /* عشان ما يلمس الحواف بزيادة في الجوالات الصغيرة */
            max-width: 420px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            border-radius: 35px;
        }

        .user-img {
            width: 125px;
            height: 125px;
            border-radius: 50%;
            border: 3px solid #f6e27a; 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            margin-bottom: 20px;
            object-fit: cover;
            background-color: #000;
        }

        .user-id {
            font-size: 2.2rem; /* كبّرنا ARTH عشان تطلع فخمة */
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 30px;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gold-shine 3s linear infinite;
            background-size: 200% auto;
        }

        @keyframes gold-shine {
            to { background-position: 200% center; }
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn-link {
            position: relative;
            display: flex;
            align-items: center;
            padding: 18px 22px;
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 18px;
            overflow: hidden;
            transition: 0.3s ease;
            width: 100%;
        }

        .sword-img {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%) scale(0.7);
            height: 85%;
            opacity: 0;
            transition: 0.4s ease-out;
            z-index: 1;
            filter: drop-shadow(0 0 10px #f6e27a);
        }

        .sword-large {
            height: 110% !important;
            right: 5px !important;
        }

        .btn-text {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 700;
        }

        .btn-link:hover, .btn-link:active {
            background: rgba(255, 255, 255, 0.12);
            border-color: #f6e27a;
            transform: scale(1.02);
        }

        .btn-link:hover .sword-img, .btn-link:active .sword-img {
            opacity: 1;
            transform: translateY(-50%) scale(1.05);
        }

        .footer-rights {
            width: 100%;
            text-align: center;
            padding: 30px 0 20px 0;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4); 
            font-family: 'Noto Sans Arabic', sans-serif;
            letter-spacing: 2px;
        }

        @media (max-width: 380px) {
            .user-id { font-size: 1.8rem; }
            .main-card { padding: 30px 15px; }
            .btn-text { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="wrapper">
        <div class="main-card">
            <img src="m1.png" class="user-img" alt="ARTH" loading="eager" fetchpriority="high">
            
            <div class="user-id">♯ 𝔠𝔞𝔩𝔩 𝟗𝟏𝟏</div>
            
            <div class="links-wrapper">
                <a href="https://discord.gg/FbgUF7aXK2" class="btn-link" target="_blank">
                    <img src="s1.png" class="sword-img" loading="lazy">
                    <div class="btn-text"><i class="fab fa-discord"></i> DISCORD</div>
                </a>

                <a href="https://www.tiktok.com/@qn_1u" class="btn-link" target="_blank">
                    <img src="s2.png" class="sword-img" loading="lazy">
                    <div class="btn-text"><i class="fab fa-tiktok"></i> TIKTOK</div>
                </a>

                <a href="https://www.instagram.com/Qzk.U" class="btn-link" target="_blank">
                    <img src="s3.png" class="sword-img sword-large" loading="lazy">
                    <div class="btn-text"><i class="fab fa-instagram"></i> INSTAGRAM</div>
                </a>

                <a href="https://www.snapchat.com/@qn-k3" class="btn-link" target="_blank">
                    <img src="s4.png" class="sword-img sword-large" loading="lazy">
                    <div class="btn-text"><i class="fab fa-snapchat"></i> SNAPCHAT</div>
                </a>
            </div>
        </div>
    </div>

    <footer class="footer-rights">
        جميع الحقوق محفوظة إلى ARTH
    </footer>

    <script>
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, snowflakes = [];

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            snowflakes = [];
            for (let i = 0; i < 150; i++) { 
                snowflakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2 + 1, 
                    v: Math.random() * 1.2 + 0.5 
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; 
            ctx.beginPath();
            for (let i = 0; i < snowflakes.length; i++) {
                let p = snowflakes[i];
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
            }
            ctx.fill();
            update();
        }

        function update() {
            for (let i = 0; i < snowflakes.length; i++) {
                let p = snowflakes[i];
                p.y += p.v;
                if (p.y > height) {
                    snowflakes[i].y = -10;
                    snowflakes[i].x = Math.random() * width;
                }
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
